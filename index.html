<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mix2T Calc - Calculadora de Mistura 2T</title>
    <meta name="description" content="Calculadora rápida e offline para mistura de gasolina e óleo 2 tempos. Toyama, Stihl, Husqvarna e mais." />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
  </head>
  <body data-theme="dark">
    <div id="app" class="app-container">
      <header>
        <div class="logo-group">
          <h1>Mix2T Calc</h1>
          <p id="brand-indicator" style="font-size: 0.75rem; color: var(--text-muted);">Proporção Personalizada</p>
        </div>
        <button id="theme-toggle" class="theme-toggle" aria-label="Alternar Tema">
          <i data-lucide="moon" id="theme-icon"></i>
        </button>
      </header>

      <main class="main-card animate-in">
        <!-- Busca de Marcas -->
        <div class="search-container">
          <div class="input-wrapper">
            <input type="text" id="brand-search" placeholder="Buscar marca ou modelo (Toyama...)" autocomplete="off" />
            <i data-lucide="search" style="position: absolute; right: 16px; color: var(--text-muted); width: 20px;"></i>
          </div>
          <div id="search-results" class="search-results">
            <!-- Items via JS -->
          </div>
        </div>

        <div class="quick-selector">
          <button class="brand-btn active" data-ratio="50">50:1</button>
          <button class="brand-btn" data-ratio="25">25:1</button>
        </div>

        <!-- Calculadora Principal -->
        <div id="direct-mode" class="calc-mode">
          <div class="input-group">
            <label for="fuel-input">Quantidade de Gasolina</label>
            <div class="input-wrapper">
              <input type="number" id="fuel-input" inputmode="decimal" placeholder="Ex: 1" step="0.1" />
              <span style="position: absolute; right: 16px; font-weight: 600; color: var(--text-muted);">LITROS</span>
            </div>
          </div>
        </div>

        <div id="inverse-mode" class="calc-mode" style="display: none;">
          <div class="input-group">
            <label for="oil-input">Quantidade de Óleo</label>
            <div class="input-wrapper">
              <input type="number" id="oil-input" inputmode="decimal" placeholder="Ex: 20" step="1" />
              <span style="position: absolute; right: 16px; font-weight: 600; color: var(--text-muted);">ML</span>
            </div>
          </div>
        </div>

        <!-- Resultado -->
        <div class="result-area">
          <div id="result-label-text" class="result-label">ÓLEO NECESSÁRIO</div>
          <div class="result-value">
            <span id="result-num">0</span><span id="result-unit" class="unit">ml</span>
          </div>
        </div>

        <div class="info-section" style="font-size: 0.75rem; color: var(--text-muted); text-align: center;">
          <p id="ratio-description">Fórmula: Gasolina / Proporção. 1L de gasolina a 50:1 requer 20ml de óleo.</p>
        </div>
      </main>

      <nav class="footer-nav">
        <button class="nav-btn active" id="btn-fuel">
          <i data-lucide="fuel"></i>
          <span>Gas → Óleo</span>
        </button>
        <button class="nav-btn" id="btn-oil">
          <i data-lucide="droplet"></i>
          <span>Óleo → Gas</span>
        </button>
      </nav>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
